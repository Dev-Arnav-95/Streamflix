<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- ============================================================
         STREAMFLIX-0  |  github.com/Dev-Arnav-95/streamflix-0
         A private single-user streaming site.
         Stack: Vanilla JS · Firebase Auth · Firestore · TMDB API
    ============================================================ -->

    <title>Streamflix-0</title>

    <!-- Icons — swap with any icon library you prefer -->
    <script src="https://unpkg.com/@phosphor-icons/web"></script>

    <!-- Firebase — keep these three, they are free CDN scripts -->
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

    <style>
        /* ============================================================
           MINIMAL STYLE — just enough to be usable.
           If you want a polished UI, check the full version in the
           repo or style however you like.
        ============================================================ */

        * { box-sizing: border-box; margin: 0; padding: 0; }

        :root {
            /* Change these to retheme the whole app */
            --bg:      #0d0d0d;
            --surface: #1a1a1a;
            --border:  #2e2e2e;
            --text:    #f0f0f0;
            --muted:   #888;
            --accent:  #e5091a;   /* primary colour — buttons, highlights */
            --accent2: #00c8ff;   /* secondary colour — badges, info */
        }

        body {
            background: var(--bg);
            color: var(--text);
            font-family: system-ui, sans-serif;
            font-size: 15px;
            line-height: 1.5;
        }

        a { color: var(--accent); text-decoration: none; }
        button { cursor: pointer; font-family: inherit; }

        /* ── screens ── */
        .screen { display: none; }
        .screen.active { display: block; }

        /* ── loader ── */
        #bootScreen {
            position: fixed; inset: 0;
            background: var(--bg);
            display: flex; align-items: center; justify-content: center;
            flex-direction: column; gap: 16px;
            font-size: 1.6rem; font-weight: 700; letter-spacing: .1em;
            z-index: 999;
        }
        #bootScreen.gone { display: none; }
        .spinner {
            width: 28px; height: 28px;
            border: 3px solid var(--border);
            border-top-color: var(--accent);
            border-radius: 50%;
            animation: spin .8s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }

        /* ── login ── */
        #loginScreen {
            min-height: 100vh;
            display: flex; align-items: center; justify-content: center;
        }
        .login-box {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 40px 36px;
            width: 360px;
        }
        .login-box h1 { margin-bottom: 6px; font-size: 1.6rem; color: var(--accent); }
        .login-box p  { color: var(--muted); font-size: .85rem; margin-bottom: 28px; }
        .login-box input {
            width: 100%; padding: 11px 14px; margin-bottom: 12px;
            background: var(--bg); border: 1px solid var(--border);
            border-radius: 8px; color: var(--text); font-size: .95rem;
        }
        .login-box input:focus { outline: 2px solid var(--accent); }
        .btn-primary {
            width: 100%; padding: 12px;
            background: var(--accent); color: white;
            border: none; border-radius: 8px;
            font-size: 1rem; font-weight: 600;
        }
        .btn-primary:hover { opacity: .88; }
        .error-msg { color: #ff6b6b; font-size: .82rem; margin-top: 10px; display: none; }
        .error-msg.show { display: block; }

        /* ── app layout ── */
        #appScreen { min-height: 100vh; }

        /* topbar */
        .topbar {
            display: flex; align-items: center; justify-content: space-between;
            padding: 14px 24px;
            background: var(--surface);
            border-bottom: 1px solid var(--border);
            position: sticky; top: 0; z-index: 100;
            gap: 16px; flex-wrap: wrap;
        }
        .topbar-brand { font-size: 1.2rem; font-weight: 700; color: var(--accent); white-space: nowrap; }
        .topbar-nav { display: flex; gap: 6px; flex-wrap: wrap; }
        .nav-btn {
            padding: 6px 14px;
            background: transparent; color: var(--muted);
            border: 1px solid var(--border); border-radius: 20px;
            font-size: .82rem;
        }
        .nav-btn:hover { color: var(--text); border-color: var(--text); }
        .nav-btn.active { background: var(--accent); color: white; border-color: var(--accent); }
        .topbar-search { display: flex; gap: 8px; flex: 1; max-width: 360px; }
        .topbar-search input {
            flex: 1; padding: 7px 14px;
            background: var(--bg); border: 1px solid var(--border);
            border-radius: 20px; color: var(--text); font-size: .88rem;
        }
        .topbar-search input:focus { outline: 2px solid var(--accent); }
        .topbar-right { display: flex; gap: 10px; align-items: center; }
        .topbar-right button {
            padding: 6px 14px;
            background: transparent; color: var(--muted);
            border: 1px solid var(--border); border-radius: 6px;
            font-size: .82rem;
        }
        .topbar-right button:hover { color: var(--text); }

        /* main content */
        #viewContainer { padding: 24px; }

        /* hero */
        .hero {
            position: relative; border-radius: 12px; overflow: hidden;
            height: 380px; margin-bottom: 36px;
            display: flex; align-items: flex-end;
            border: 1px solid var(--border);
        }
        .hero img {
            position: absolute; inset: 0;
            width: 100%; height: 100%; object-fit: cover;
        }
        .hero-grad {
            position: absolute; inset: 0;
            background: linear-gradient(to top, rgba(0,0,0,.95) 0%, rgba(0,0,0,.3) 60%, transparent 100%);
        }
        .hero-info { position: relative; padding: 28px; max-width: 640px; }
        .hero-badge {
            display: inline-block; padding: 3px 10px; margin-bottom: 10px;
            background: var(--accent); border-radius: 4px;
            font-size: .7rem; font-weight: 700; letter-spacing: .08em; text-transform: uppercase;
        }
        .hero-title { font-size: 2rem; font-weight: 700; margin-bottom: 8px; line-height: 1.1; }
        .hero-meta  { font-size: .82rem; color: #bbb; margin-bottom: 14px; }
        .hero-desc  {
            font-size: .88rem; color: #ccc; margin-bottom: 20px;
            display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden;
        }
        .hero-btns { display: flex; gap: 10px; flex-wrap: wrap; }
        .btn-watch {
            padding: 10px 24px;
            background: var(--accent); color: white;
            border: none; border-radius: 6px;
            font-size: .9rem; font-weight: 600;
        }
        .btn-watch:hover { opacity: .88; }
        .btn-add {
            padding: 10px 20px;
            background: rgba(255,255,255,.1); color: white;
            border: 1px solid rgba(255,255,255,.2); border-radius: 6px;
            font-size: .9rem;
        }
        .btn-add:hover { background: rgba(255,255,255,.18); }

        /* section heading */
        .section-head {
            display: flex; justify-content: space-between; align-items: baseline;
            margin-bottom: 16px;
        }
        .section-title { font-size: 1.1rem; font-weight: 700; }
        .section-link  { font-size: .8rem; color: var(--accent); }

        /* grid */
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
            gap: 14px;
            margin-bottom: 40px;
        }
        .card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 8px; overflow: hidden;
            cursor: pointer; transition: border-color .2s, transform .2s;
            aspect-ratio: 2/3; position: relative;
        }
        .card:hover { border-color: var(--accent); transform: translateY(-4px); }
        .card img { width: 100%; height: 100%; object-fit: cover; display: block; }
        .card-label {
            position: absolute; bottom: 0; left: 0; right: 0;
            padding: 20px 8px 8px;
            background: linear-gradient(to top, rgba(0,0,0,.9), transparent);
            font-size: .75rem; font-weight: 600;
        }
        .card-type {
            position: absolute; top: 6px; right: 6px;
            background: var(--accent); padding: 2px 6px; border-radius: 4px;
            font-size: .6rem; font-weight: 700; text-transform: uppercase;
        }

        /* genre chips */
        .genre-bar { display: flex; gap: 8px; overflow-x: auto; margin-bottom: 20px; padding-bottom: 4px; }
        .genre-bar::-webkit-scrollbar { display: none; }
        .chip {
            padding: 6px 16px; white-space: nowrap;
            background: var(--surface); border: 1px solid var(--border);
            border-radius: 20px; font-size: .8rem; cursor: pointer;
        }
        .chip:hover { border-color: var(--accent); color: var(--accent); }
        .chip.active { background: var(--accent); border-color: var(--accent); color: white; }

        /* page header */
        .page-head { margin-bottom: 20px; }
        .page-head h1 { font-size: 1.6rem; margin-bottom: 4px; }
        .page-head p  { color: var(--muted); font-size: .88rem; }

        /* empty */
        .empty { padding: 60px 20px; text-align: center; color: var(--muted); }
        .empty i { font-size: 2.5rem; display: block; margin-bottom: 12px; }

        /* skeleton */
        .skel {
            background: linear-gradient(90deg, var(--surface) 25%, #222 50%, var(--surface) 75%);
            background-size: 200% 100%;
            animation: shimmer 1.4s infinite;
            border-radius: 8px;
        }
        @keyframes shimmer { 0%{background-position:200% 0} 100%{background-position:-200% 0} }

        /* player modal */
        #playerModal {
            position: fixed; inset: 0;
            background: #000; z-index: 500;
            display: none; flex-direction: column;
        }
        #playerModal.open { display: flex; }
        .player-head {
            display: flex; align-items: center; justify-content: space-between;
            padding: 10px 16px;
            background: var(--surface); border-bottom: 1px solid var(--border);
            flex-shrink: 0; gap: 10px; flex-wrap: wrap;
        }
        .player-head h2 { font-size: 1rem; }
        .player-controls { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }
        .player-controls select, .player-controls button {
            padding: 5px 12px;
            background: var(--bg); color: var(--text);
            border: 1px solid var(--border); border-radius: 6px;
            font-size: .82rem;
        }
        .close-btn {
            padding: 6px 14px;
            background: var(--accent); color: white;
            border: none; border-radius: 6px; font-size: .85rem;
        }
        iframe#streamFrame { flex: 1; border: none; width: 100%; }

        /* TV episode panel */
        .ep-panel {
            width: 280px; background: var(--surface);
            border-left: 1px solid var(--border);
            display: flex; flex-direction: column; flex-shrink: 0;
        }
        .ep-panel-head { padding: 12px 14px; border-bottom: 1px solid var(--border); font-weight: 600; font-size: .88rem; }
        .ep-list { overflow-y: auto; flex: 1; padding: 8px; display: grid; gap: 4px; }
        .ep-item {
            padding: 8px 10px; border-radius: 6px;
            border: 1px solid var(--border);
            cursor: pointer; font-size: .8rem;
            display: flex; gap: 8px; align-items: center;
        }
        .ep-item:hover { border-color: var(--accent); }
        .ep-num {
            background: var(--accent); color: white;
            padding: 1px 6px; border-radius: 4px;
            font-size: .68rem; font-weight: 700; flex-shrink: 0;
        }
        .player-body { display: flex; flex: 1; overflow: hidden; }

        /* settings modal */
        #settingsModal {
            position: fixed; inset: 0;
            background: rgba(0,0,0,.8);
            z-index: 400; display: none;
            align-items: center; justify-content: center;
        }
        #settingsModal.open { display: flex; }
        .settings-box {
            background: var(--surface); border: 1px solid var(--border);
            border-radius: 12px; padding: 36px;
            width: 360px; max-width: calc(100vw - 32px);
        }
        .settings-box h2 { margin-bottom: 20px; }
        .settings-box label { display: block; font-size: .8rem; color: var(--muted); margin-bottom: 6px; }
        .settings-box input {
            width: 100%; padding: 10px 14px;
            background: var(--bg); border: 1px solid var(--border);
            border-radius: 8px; color: var(--text); margin-bottom: 16px; font-size: .95rem;
        }
        .settings-box input:focus { outline: 2px solid var(--accent); }
        .btn-row { display: flex; gap: 8px; flex-wrap: wrap; margin-top: 8px; }
        .btn-row button {
            flex: 1; padding: 10px;
            background: transparent; border: 1px solid var(--border);
            border-radius: 8px; color: var(--text); font-size: .88rem;
        }
        .btn-row button:hover { border-color: var(--text); }
        .btn-danger { border-color: #c00 !important; color: #ff6b6b !important; }

        /* toast */
        #toast {
            position: fixed; bottom: 24px; right: 24px;
            background: var(--surface); border: 1px solid var(--border);
            padding: 10px 18px; border-radius: 8px;
            font-size: .85rem; z-index: 9999;
            transform: translateY(80px); opacity: 0;
            transition: .3s; pointer-events: none;
        }
        #toast.show { transform: translateY(0); opacity: 1; }

        /* mobile */
        @media (max-width: 640px) {
            .topbar { padding: 10px 14px; }
            .topbar-search { max-width: 100%; order: 3; flex: 1 1 100%; }
            #viewContainer { padding: 14px; }
            .hero { height: 280px; }
            .hero-title { font-size: 1.4rem; }
            .grid { grid-template-columns: repeat(auto-fill, minmax(110px, 1fr)); gap: 10px; }
            .ep-panel { display: none; }
        }
    </style>
</head>
<body>

<!-- ── Boot loader: shown while Firebase checks if you're already logged in ── -->
<div id="bootScreen">
    <span id="appNameEl">Streamflix-0</span>
    <div class="spinner"></div>
</div>

<!-- ── Login ── -->
<div id="loginScreen" class="screen">
    <div class="login-box">
        <h1 id="loginTitleEl">Streamflix-0</h1>
        <p>Private access only. Sign in to continue.</p>
        <input type="email"    id="loginEmail"    placeholder="Email address"  autocomplete="email">
        <input type="password" id="loginPassword" placeholder="Password"       autocomplete="current-password">
        <button class="btn-primary" id="loginBtn">Sign In</button>
        <div class="error-msg" id="loginError"></div>
    </div>
</div>

<!-- ── App ── -->
<div id="appScreen" class="screen">
    <header class="topbar">
        <div class="topbar-brand" id="topbarBrandEl">Streamflix-0</div>
        <nav class="topbar-nav">
            <button class="nav-btn active" data-view="home">Home</button>
            <button class="nav-btn" data-view="explore">Explore</button>
            <button class="nav-btn" data-view="trending">Trending</button>
            <button class="nav-btn" data-view="watchlist">Watchlist</button>
            <button class="nav-btn" data-view="history">History</button>
        </nav>
        <div class="topbar-search">
            <input type="text" id="searchInput" placeholder="Search movies, series…">
        </div>
        <div class="topbar-right">
            <span id="userName" style="color:var(--muted);font-size:.85rem;"></span>
            <button onclick="openSettings()">⚙ Settings</button>
        </div>
    </header>
    <div id="viewContainer"></div>
</div>

<!-- ── Player ── -->
<div id="playerModal">
    <div class="player-head">
        <h2 id="playerTitle">—</h2>
        <div class="player-controls">
            <button id="srv1Btn" onclick="setServer(1)">Server 1</button>
            <button id="srv2Btn" onclick="setServer(2)">Server 2</button>
            <select id="seasonPick" style="display:none;" onchange="loadEpisodes(state.currentMedia.id, this.value)"></select>
            <button class="close-btn" onclick="closePlayer()">✕ Close</button>
        </div>
    </div>
    <div class="player-body">
        <iframe id="streamFrame" allowfullscreen allow="autoplay; picture-in-picture"></iframe>
        <div class="ep-panel" id="epPanel" style="display:none;">
            <div class="ep-panel-head">Episodes</div>
            <div class="ep-list" id="epList"></div>
        </div>
    </div>
</div>

<!-- ── Settings ── -->
<div id="settingsModal">
    <div class="settings-box">
        <h2>Settings</h2>
        <label>Display Name</label>
        <input type="text" id="inputName" placeholder="Your name">
        <label>Avatar Seed (changes your Dicebear avatar)</label>
        <input type="text" id="inputAvatar" placeholder="Any word">
        <div class="btn-row">
            <button class="btn-primary" style="border:none;" onclick="saveProfile()">Save</button>
            <button onclick="closeSettings()">Cancel</button>
            <button class="btn-danger" onclick="signOut()">Sign Out</button>
        </div>
        <div class="btn-row" style="margin-top:8px;">
            <button onclick="resetData()" style="color:var(--muted);font-size:.82rem;">Clear Watchlist &amp; History</button>
        </div>
    </div>
</div>

<div id="toast"></div>

<script>
/* ================================================================
   ╔══════════════════════════════════════════════════════════════╗
   ║  CONFIGURATION — edit this block, nothing else needs to     ║
   ║  change for a basic setup                                    ║
   ╚══════════════════════════════════════════════════════════════╝

   STEPS:
   1. APP_NAME  → whatever you want to call your site
   2. FIREBASE  → Firebase Console → Project Settings → Your Web App
                  (Enable Email/Password Auth + Firestore first — see README)
   3. TMDB_KEY  → free at themoviedb.org/settings/api
   4. PLAYERS   → embed server URLs, swap if one goes down
================================================================ */

const APP_NAME = 'Streamflix-0';

const FIREBASE_CONFIG = {
    apiKey:            'YOUR_FIREBASE_API_KEY',
    authDomain:        'YOUR_PROJECT_ID.firebaseapp.com',
    projectId:         'YOUR_PROJECT_ID',
    storageBucket:     'YOUR_PROJECT_ID.firebasestorage.app',
    messagingSenderId: 'YOUR_MESSAGING_SENDER_ID',
    appId:             'YOUR_APP_ID',
};

const TMDB_KEY = 'YOUR_TMDB_API_KEY';

const PLAYER_S1 = 'https://vsembed.ru/embed';    // Server 1 embed URL
const PLAYER_S2 = 'https://2embed.org/embed';    // Server 2 embed URL

/* ================================================================
   APP CODE — no need to touch below unless adding features
================================================================ */

const TMDB_BASE = 'https://api.themoviedb.org/3';
const IMG_BASE  = 'https://image.tmdb.org/t/p/';

/* Apply APP_NAME everywhere in the DOM */
document.title = APP_NAME;
['appNameEl','loginTitleEl','topbarBrandEl'].forEach(id => {
    document.getElementById(id).textContent = APP_NAME;
});

/* ── Firebase init ── */
let auth, db, currentUser;
try {
    firebase.initializeApp(FIREBASE_CONFIG);
    auth = firebase.auth();
    db   = firebase.firestore();
} catch(e) {
    console.warn('[App] Firebase init failed:', e.message);
}

/* ── Runtime state ── */
let state = {
    view: 'home',
    user: { name: 'Viewer', avatar: 'felix', watchlist: [], history: [] },
    genres: { movie: [], tv: [] },
    currentMedia: null,
    activeServer: 1,
};

/* ================================================================
   AUTH
================================================================ */
if (auth) {
    auth.onAuthStateChanged(async user => {
        if (user) { currentUser = user; await bootApp(user); }
        else showScreen('login');
    });
} else {
    showScreen('login');
    showErr('Firebase not configured — fill in FIREBASE_CONFIG above.');
}

document.getElementById('loginBtn').onclick = doLogin;
document.getElementById('loginPassword').onkeydown = e => { if (e.key === 'Enter') doLogin(); };

async function doLogin() {
    const email = document.getElementById('loginEmail').value.trim();
    const pass  = document.getElementById('loginPassword').value;
    if (!email || !pass) { showErr('Fill in both fields.'); return; }
    const btn = document.getElementById('loginBtn');
    btn.textContent = 'Signing in…'; btn.disabled = true;
    hideErr();
    try {
        await auth.signInWithEmailAndPassword(email, pass);
    } catch(e) {
        const friendly = ['auth/wrong-password','auth/user-not-found','auth/invalid-credential'].includes(e.code)
            ? 'Invalid email or password.' : e.message;
        showErr(friendly);
        btn.textContent = 'Sign In'; btn.disabled = false;
    }
}

function showErr(msg) {
    const el = document.getElementById('loginError');
    el.textContent = '⚠ ' + msg; el.classList.add('show');
}
function hideErr() { document.getElementById('loginError').classList.remove('show'); }

function signOut() {
    if (auth) auth.signOut();
    closeSettings();
    toast('Signed out');
}

/* ================================================================
   FIRESTORE
================================================================ */
async function loadUserData(uid) {
    if (!db) return;
    try {
        const snap = await db.collection('users').doc(uid).get();
        if (snap.exists) {
            Object.assign(state.user, snap.data());
        } else {
            await db.collection('users').doc(uid).set(state.user);
        }
    } catch(e) { console.warn('[Firestore] load:', e.message); }
}

async function saveUserData() {
    if (!db || !currentUser) {
        localStorage.setItem('sf0_user', JSON.stringify(state.user));
        return;
    }
    try {
        await db.collection('users').doc(currentUser.uid).set(state.user, { merge: true });
    } catch(e) { console.warn('[Firestore] save:', e.message); }
}

/* ================================================================
   BOOT
================================================================ */
async function bootApp(user) {
    await loadUserData(user.uid);
    await fetchGenres();
    document.getElementById('userName').textContent      = state.user.name || user.email;
    document.getElementById('inputName').value           = state.user.name   || '';
    document.getElementById('inputAvatar').value         = state.user.avatar || '';
    renderView('home');
    setupNav();
    showScreen('app');
}

async function fetchGenres() {
    try {
        const [m, t] = await Promise.all([tmdb('/genre/movie/list'), tmdb('/genre/tv/list')]);
        state.genres.movie = m.genres || [];
        state.genres.tv    = t.genres || [];
    } catch(e) {}
}

/* TMDB fetch helper */
async function tmdb(path, params = {}) {
    const url = new URL(TMDB_BASE + path);
    url.searchParams.set('api_key', TMDB_KEY);
    Object.entries(params).forEach(([k,v]) => url.searchParams.set(k, v));
    return fetch(url).then(r => r.json());
}

/* ================================================================
   NAV
================================================================ */
function setupNav() {
    document.querySelectorAll('.nav-btn[data-view]').forEach(btn =>
        btn.addEventListener('click', () => renderView(btn.dataset.view))
    );
    let t;
    const s = document.getElementById('searchInput');
    s.addEventListener('keydown', e => { if (e.key === 'Enter') renderView('search', s.value.trim()); });
    s.addEventListener('input', () => {
        clearTimeout(t);
        t = setTimeout(() => { if (s.value.trim().length > 2) renderView('search', s.value.trim()); }, 500);
    });
}

function setActiveNav(v) {
    document.querySelectorAll('.nav-btn[data-view]').forEach(b =>
        b.classList.toggle('active', b.dataset.view === v)
    );
}

/* ================================================================
   VIEWS
================================================================ */
async function renderView(viewName, query = '') {
    state.view = viewName;
    setActiveNav(viewName);
    const c = document.getElementById('viewContainer');
    c.innerHTML = `<div class="grid">${Array(12).fill(`<div class="skel" style="aspect-ratio:2/3;"></div>`).join('')}</div>`;

    let html = '';
    if      (viewName === 'home')      html = await buildHome();
    else if (viewName === 'explore')   html = await buildExplore();
    else if (viewName === 'trending')  html = await buildTrending();
    else if (viewName === 'search')    html = await buildSearch(query);
    else if (viewName === 'watchlist') html = buildLibrary('Watchlist', state.user.watchlist);
    else if (viewName === 'history')   html = buildLibrary('Watch History', state.user.history);

    c.innerHTML = html;
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

async function buildHome() {
    const [trending, popular, topTv] = await Promise.all([
        tmdb('/trending/all/day'),
        tmdb('/movie/popular'),
        tmdb('/tv/top_rated'),
    ]);
    const h = trending.results[0];
    return `
        <div class="hero">
            <img src="${IMG_BASE}original${h.backdrop_path}" alt="" loading="lazy">
            <div class="hero-grad"></div>
            <div class="hero-info">
                <span class="hero-badge">Trending Today</span>
                <div class="hero-title">${h.title||h.name}</div>
                <div class="hero-meta">⭐ ${h.vote_average?.toFixed(1)} · ${(h.release_date||h.first_air_date||'').slice(0,4)} · ${(h.media_type||'').toUpperCase()}</div>
                <div class="hero-desc">${h.overview}</div>
                <div class="hero-btns">
                    <button class="btn-watch" onclick="playMedia(${h.id},'${h.media_type}')">▶ Watch Now</button>
                    <button class="btn-add"   onclick="toggleWatchlist(${esc(h)})">+ Watchlist</button>
                </div>
            </div>
        </div>
        <div class="section-head">
            <span class="section-title">Popular Movies</span>
            <a class="section-link" href="#" onclick="renderView('explore');return false;">See all</a>
        </div>
        <div class="grid">${cards(popular.results.slice(0,12), 'movie')}</div>
        <div class="section-head"><span class="section-title">Top Rated Series</span></div>
        <div class="grid">${cards(topTv.results.slice(0,12), 'tv')}</div>`;
}

async function buildExplore() {
    const data  = await tmdb('/discover/movie', { sort_by: 'popularity.desc' });
    const chips = state.genres.movie.map(g =>
        `<div class="chip" onclick="filterGenre(${g.id},this)">${g.name}</div>`
    ).join('');
    return `
        <div class="page-head"><h1>Explore Movies</h1><p>Filter by genre or browse popular titles.</p></div>
        <div class="genre-bar">${chips}</div>
        <div class="grid" id="exploreGrid">${cards(data.results, 'movie')}</div>`;
}

async function buildTrending() {
    const data = await tmdb('/trending/all/week');
    return `
        <div class="page-head"><h1>Weekly Trends</h1><p>What the world is watching.</p></div>
        <div class="grid">${cards(data.results, 'movie')}</div>`;
}

async function buildSearch(query) {
    const data    = await tmdb('/search/multi', { query });
    const results = (data.results||[]).filter(r => r.media_type !== 'person');
    return `
        <div class="page-head"><h1>Search Results</h1><p>${results.length} results for "<em>${query}</em>"</p></div>
        <div class="grid">${results.length
            ? cards(results, 'movie')
            : '<div class="empty"><i class="ph ph-magnifying-glass"></i><p>Nothing found.</p></div>'
        }</div>`;
}

function buildLibrary(title, list) {
    return `
        <div class="page-head"><h1>${title}</h1><p>${list.length} saved item${list.length!==1?'s':''}.</p></div>
        <div class="grid">${list.length
            ? cards(list, 'movie')
            : '<div class="empty"><i class="ph ph-folder-open"></i><p>Nothing here yet.</p></div>'
        }</div>`;
}

function cards(items, defaultType) {
    return items.map(item => {
        const type   = item.media_type || defaultType;
        const title  = item.title || item.name || 'Untitled';
        const poster = item.poster_path
            ? `${IMG_BASE}w300${item.poster_path}`
            : `https://placehold.co/300x450/1a1a1a/666?text=${encodeURIComponent(title)}`;
        const year = (item.release_date || item.first_air_date || '').slice(0,4);
        return `
            <div class="card" onclick="playMedia(${item.id},'${type}')">
                <img src="${poster}" loading="lazy" alt="${title}">
                <span class="card-type">${type.toUpperCase()}</span>
                <div class="card-label">${title}${year?' · '+year:''}</div>
            </div>`;
    }).join('');
}

async function filterGenre(id, el) {
    document.querySelectorAll('.chip').forEach(c => c.classList.remove('active'));
    el.classList.add('active');
    const grid = document.getElementById('exploreGrid');
    grid.innerHTML = Array(12).fill(`<div class="skel" style="aspect-ratio:2/3;"></div>`).join('');
    const data = await tmdb('/discover/movie', { with_genres: id, sort_by: 'popularity.desc' });
    grid.innerHTML = cards(data.results, 'movie');
}

/* ================================================================
   PLAYER
================================================================ */
async function playMedia(id, type) {
    state.currentMedia = { id, type };
    const data = await tmdb(`/${type}/${id}`);
    document.getElementById('playerTitle').textContent = data.title || data.name;

    const epPanel    = document.getElementById('epPanel');
    const seasonPick = document.getElementById('seasonPick');

    if (type === 'tv') {
        epPanel.style.display    = 'flex';
        seasonPick.style.display = 'inline-block';
        seasonPick.innerHTML = (data.seasons||[])
            .filter(s => s.season_number > 0)
            .map(s => `<option value="${s.season_number}">Season ${s.season_number}</option>`)
            .join('');
        await loadEpisodes(id, 1);
    } else {
        epPanel.style.display    = 'none';
        seasonPick.style.display = 'none';
        loadStream();
    }

    document.getElementById('playerModal').classList.add('open');
    addToHistory(data, type);
}

async function loadEpisodes(id, season) {
    const data = await tmdb(`/tv/${id}/season/${season}`);
    document.getElementById('epList').innerHTML = (data.episodes||[]).map(ep => `
        <div class="ep-item" onclick="playEpisode(${season},${ep.episode_number})">
            <span class="ep-num">E${ep.episode_number}</span>
            <span>${ep.name}</span>
        </div>`).join('');
    playEpisode(season, 1);
}

function playEpisode(s, e) {
    const base = state.activeServer === 1 ? PLAYER_S1 : PLAYER_S2;
    document.getElementById('streamFrame').src =
        `${base}/tv?tmdb=${state.currentMedia.id}&season=${s}&episode=${e}`;
}

function loadStream() {
    const base = state.activeServer === 1 ? PLAYER_S1 : PLAYER_S2;
    document.getElementById('streamFrame').src = `${base}/movie?tmdb=${state.currentMedia.id}`;
}

function setServer(num) {
    state.activeServer = num;
    document.getElementById('srv1Btn').style.color = num === 1 ? 'var(--accent)' : '';
    document.getElementById('srv2Btn').style.color = num === 2 ? 'var(--accent)' : '';
    if (state.currentMedia?.type === 'movie') loadStream();
    else toast('Server changed — pick an episode to reload.');
}

function closePlayer() {
    document.getElementById('playerModal').classList.remove('open');
    document.getElementById('streamFrame').src = '';
}

/* ================================================================
   WATCHLIST & HISTORY
================================================================ */
function toggleWatchlist(item) {
    const idx = state.user.watchlist.findIndex(w => w.id === item.id);
    if (idx > -1) { state.user.watchlist.splice(idx, 1); toast('Removed from Watchlist'); }
    else           { state.user.watchlist.unshift(item);  toast('Added to Watchlist'); }
    saveUserData();
}

function addToHistory(item, type) {
    const entry = { ...item, media_type: type, _ts: Date.now() };
    state.user.history = state.user.history.filter(h => h.id !== item.id);
    state.user.history.unshift(entry);
    if (state.user.history.length > 50) state.user.history.length = 50;
    saveUserData();
}

/* ================================================================
   SETTINGS
================================================================ */
function openSettings() {
    document.getElementById('inputName').value   = state.user.name   || '';
    document.getElementById('inputAvatar').value = state.user.avatar || '';
    document.getElementById('settingsModal').classList.add('open');
}
function closeSettings() { document.getElementById('settingsModal').classList.remove('open'); }

document.getElementById('settingsModal').addEventListener('click', e => {
    if (e.target === document.getElementById('settingsModal')) closeSettings();
});

async function saveProfile() {
    state.user.name   = document.getElementById('inputName').value.trim()   || state.user.name;
    state.user.avatar = document.getElementById('inputAvatar').value.trim() || state.user.avatar;
    await saveUserData();
    document.getElementById('userName').textContent = state.user.name;
    closeSettings();
    toast('Profile saved');
}

function resetData() {
    if (!confirm('Clear all watchlist and history?')) return;
    state.user.watchlist = [];
    state.user.history   = [];
    saveUserData();
    closeSettings();
    toast('Data cleared');
}

/* ================================================================
   UTILS
================================================================ */
function esc(obj) { return JSON.stringify(obj).replace(/"/g, '&quot;'); }

function showScreen(name) {
    document.getElementById('bootScreen').classList.add('gone');
    document.getElementById('loginScreen').classList.toggle('active', name === 'login');
    document.getElementById('appScreen').classList.toggle('active',   name === 'app');
}

let _tt;
function toast(msg) {
    const el = document.getElementById('toast');
    el.textContent = msg;
    el.classList.add('show');
    clearTimeout(_tt);
    _tt = setTimeout(() => el.classList.remove('show'), 2800);
}
</script>
</body>
</html>
